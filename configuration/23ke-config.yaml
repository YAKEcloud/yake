apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: 23ke-config
  namespace: flux-system
spec:
  interval: 1m
  chart:
    spec:
      chart: configuration/23ke-config
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: 23ke
        namespace: flux-system
      interval: 1m
      valuesFiles:
        - configuration/23ke-config/values.yaml
        - configuration/23ke-config/images.yaml
  valuesFrom:
    - kind: Secret
      name: 23ke-config
