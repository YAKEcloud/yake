---
apiVersion: v1
kind: Secret
metadata:
  name: extensions-base-values
  namespace: flux-system
type: Opaque
stringData:
  values.yaml: |-
    os-ubuntu:
      version: 1.40.1

    os-gardenlinux:
      version: 0.44.0

    os-coreos:
      version: 1.30.0

    provider-hcloud:
      version: 0.6.42
      admission:
        enabled: false

    provider-azure:
      version: 1.62.1
      admission:
        enabled: true
        split: false

    provider-openstack:
      version: 1.57.0
      admission:
        enabled: true

    networking-calico:
      version: 1.59.0

    shoot-cert-service:
      version: 1.62.1

    shoot-dns-service:
      version: 1.88.0
      admission:
        enabled: true
      values:
        dnsControllerManager:
          deploy: true
          configuration:
            cacheTtl: 300
            controllers: dnscontrollers,dnssources
            dnsPoolResyncPeriod: 30m
            serverPortHttp: 8080

    shoot-oidc-service:
      version: 0.40.0

    shoot-networking-filter:
      version: 0.29.0

    shoot-networking-problemdetector:
      version: 0.33.0

    shoot-rsyslog-relp:
      version: 0.13.0

    networking-cilium:
      version: 1.48.4

    provider-alicloud:
      version: 1.72.0
      admission:
        enabled: true

    provider-aws:
      version: 1.72.0
      admission:
        enabled: true

    provider-gcp:
      version: 1.53.4
      admission:
        enabled: true

    runtime-gvisor:
      version: 0.41.0

    backup-s3:
      version: 0.8.3

    shoot-flux:
      version: 0.26.0

    acl:
      version: 1.18.0
      admission:
        enabled: true

    image-rewriter:
      version: 0.10.0

    registry-cache:
      version: 0.23.1
      admission:
        enabled: true
