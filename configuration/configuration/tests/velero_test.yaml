templates:
  - velero.yaml
tests:
  - it: should NOT create secret with test values
    values:
      - ../values-test.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: should create secret when backup enabled
    values:
      - ../values-test.yaml
    set:
      backups:
        enabled: true
        credentials:
          foo: bar
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData['values.yaml']
          value: |
            snapshotsEnabled: false

            schedules:
                full-cluster-hourly:
                  labels:
                    backup: full-cluster
                    schedule: hourly
                  schedule: "@every 1h"
                  template:
                    ttl: "52h0m"
                    includedNamespaces:
                      - '*'
                full-cluster-daily:
                  labels:
                    backup: full-cluster
                    schedule: daily
                  schedule: "@every 24h"
                  template:
                    ttl: "2160h0m"
                    includedNamespaces:
                      - '*'

