{{- if and ((.Values.gardenlet).token).id ((.Values.gardenlet).token).secret }}
apiVersion: v1
kind: Secret
metadata:
  name: bootstrap-token-{{ ((.Values.gardenlet).token).id }}   # last digits must be equal to token-id
  namespace: kube-system
type: bootstrap.kubernetes.io/token
stringData:
  token-id: "{{ ((.Values.gardenlet).token).id }}"             # must be 6 characters
  token-secret: "{{ ((.Values.gardenlet).token).secret }}"     # 16 characters
  usage-bootstrap-authentication: "true"
  usage-bootstrap-signing: "true"
{{- end }}
